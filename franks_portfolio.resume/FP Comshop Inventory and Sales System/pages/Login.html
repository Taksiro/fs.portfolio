<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Myla's Lytson Sales and Inventory System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4 mb-5 header">Myla's Lytson Sales and Inventory System</h1>
        <div class="mb-4 rounded-4 login-box">
            <div class="row">
                <div class="container-fluid p-5 col-md-6 login-container">
                    <h2 class="fw-semibold header-log">Login Admin</h2>
                    <blockquote class="blockquote p-3 rounded-5 mt-5 text-login">
                        <p class="lead">Please log in to access your account and manage your inventory.</p>
                    </blockquote>
                    <form class="forgot-password-form" action="#" method="post">
                        <div class="mb-3 mt-5">
                            <p class="lead">Please enter your registered email address to receive a password reset link.</p>
                        </div>
                        <div class="mb-3 mt-5">
                            <input type="email" class="form-control" id="email" maxlength="50" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <button type="submit" class="btn-verification-email">Send Email Reset Link</button>
                        </div>
                    </form>
                </div>
                <div class="col-md-6 p-5 border-start">
                    <form action="../pages/Admin/index.html" method="post">
                        <div class="mb-3 text-muted fw-semibold">
                            <label for="admin_username" class="form-label user-c">Username</label>
                            <input type="text" class="form-control" id="admin_username" name="admin_username" maxlength="50" placeholder="Enter your username" autocomplete="username" required>
                        </div>
                        <div class="mb-3 text-muted fw-semibold">
                            <label for="admin_password" class="form-label pass-c">Password</label>
                            <div class="input-group password-input-group">
                                <input type="password" class="form-control" id="admin_password" name="admin_password" maxlength="50" placeholder="Enter your password" autocomplete="current-password" required>
                                <span class="input-group-text ms-2" id="togglePasswordIconContainer">
                                    <i class="bi bi-eye-fill" id="togglePasswordIcon" name="togglePassword"></i>
                                </span>
                            </div>
                        </div>
                        <div class="mb-3 d-flex justify-content-between align-items-center">
                            <a class="text-decoration-none p-2" id="forgot-password-link">Forgot password?</a>
                            <button type="submit" class="btn btn-primary btn-login">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js" integrity="sha384-7qAoOXltbVP82dhxHAUje59V5r2YsVfBafyUDxEdApLPmcdhBPg1DKg1ERo0BZlK" crossorigin="anonymous"></script>
</body>
</html>
